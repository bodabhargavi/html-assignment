<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indian Cuisine</title>
  <style>
     body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #fdf6f0;
        color: #2c2c2c;
        line-height: 1.6;
        }

        header {
        text-align: center;
        background: #8b0000;
        color: white;
        padding: 20px;
        border-radius: 12px;
        }

        header h1 {
        margin: 0;
        font-size: 2.5rem;
        }

        nav a {
        color: #ffd700;
        text-decoration: none;
        margin: 0 8px;
        font-weight: bold;
        }

        nav a:hover {
        text-decoration: underline;
        }

        button {
        background: #8b0000;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        margin: 5px;
        }

        button:hover {
        background: #a52a2a;
        }

        table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        }

        th {
        background: #8b0000;
        color: white;
        }

        td, th {
        padding: 10px;
        text-align: left;
        }

        /* 🍽️ Specials cards */
        .special-item {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin: 15px 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 20px;
        }

        .special-item img {
        width: 180px;
        height: 140px;
        object-fit: cover;
        border-radius: 10px;
        }

        .special-item h3 {
        margin: 0 0 5px 0;
        }

        .price {
        font-size: 1.3rem;
        font-weight: bold;
        color: #8b0000;
        }

        footer {
        text-align: center;
        margin-top: 30px;
        color: #666;
        }

        input, select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 250px;
        }
 </style>
</head>
<body>

  <header>
    <h1>🍽️ Indian Cuisine</h1>
    <p>Fine Dining &amp; Comfort Food</p>
    <nav>
      <a href="#" onclick="showPage('home')">Home</a> ||
      <a href="#" onclick="showPage('menu')">Menu</a> ||
      <a href="#" onclick="showPage('about')">About</a> ||
      <a href="#" onclick="showPage('contact')">Contact</a>||
      <a href="#" onclick="showPage('specials')">Our Specials</a>
    </nav>
    <hr>
  </header>

  <main id="app"></main>

  <footer>
    <hr>
    <p>&copy; 2026 Indian Cuisine. All rights reserved.</p>
  </footer>

  <script>
    const pages = {
      home: `
        <h2>Welcome to Indian Cuisine</h2>
        <p>We serve freshly prepared meals made from locally sourced ingredients.</p>
        <p>Open daily: <strong>11:00 AM – 10:00 PM</strong></p>
        <h3>Today's Specials</h3>
        <ul>
          <li>Chittinadu Chicken Biryani – ₹299</li>
          <li>Smoked Prawns – ₹169</li>
          <li>Raagi sankanti with Mutton curry – ₹499</li>
          <li>Panner Tikka masala – ₹399</li>
          <li>Mushroom kaju masala curry – ₹399</li>
          <li>Gurthi vankaya Biryani – ₹299</li>
        </ul>
        <button onclick="showPage('menu')">View Full Menu</button>
        <button onclick="showPage('contact')">Make a Reservation</button>
      `,

      menu: `
        <h2>Our Menu</h2>
        <h3>Starters</h3>
        <table border="1" cellpadding="6" cellspacing="0">
          <tr><th>Item</th><th>Description</th><th>Price</th></tr>
          <tr><td>Chicken Drumsticks</td><td>Chicken legs coated with spices and cooked until it's crispy on the outside and juicy inside </td><td>₹299</td></tr>
          <tr><td>Hariyaali chicken</td><td>Tender chicken is cooked with herbaceous green paste</td><td>₹259</td></tr>
          <tr><td>Hara Bara Khebab</td><td>A nutricious, vibrant green patty</td><td>₹259</td></tr>
          <tr><td>Veg Spring rolls</td><td> A light, crispy shell filled with julienned cabbage, carrots, and bell peppers.</td><td>₹199</td></tr>
        </table>

        <h3>Mains</h3>
        <table border="1" cellpadding="6" cellspacing="0">
          <tr><th>Item</th><th>Description</th><th>Price</th></tr>
          <tr><td>Mutton Biryani</td><td>Fragrant basmati rice layered with spiced, slow-cooked goat, caramelized onions, and mint.</td><td>₹599</td></tr>
          <tr><td>Chicken Dum Biryani</td><td>Fragrant basmati rice layered with spiced, and chicken</td><td>₹499</td></tr>
          <tr><td>Mushroom Risotto</td><td>Creamy arborio rice with wild mushrooms </td><td>₹399</td></tr>
          <tr><td>Fish pulusu</td><td>Fish cooked with spices and tamrind</td><td>₹399</td></tr>
          <tr><td>Panasa biryani</td><td>Jackfruit layered with spices and basmati rice</td><td>₹299</td></tr>
        </table>

        <h3>Desserts</h3>
        <table border="1" cellpadding="6" cellspacing="0">
          <tr><th>Item</th><th>Description</th><th>Price</th></tr>
          <tr><td>Chocolate Lava Cake</td><td>Warm cake with vanilla ice cream</td><td>₹59</td></tr>
          <tr><td>Cheesecake</td><td>New York style with berry compote</td><td>₹99</td></tr>
          <tr><td>Ice Cream</td><td>3 scoops – vanilla, chocolate, or strawberry</td><td>₹49</td></tr>
        </table>

        <h3>Drinks</h3>
        <table border="1" cellpadding="6" cellspacing="0">
          <tr><th>Item</th><th>Price</th></tr>
          <tr><td>Soft Drinks (Coke, Lemonade, Juice)</td><td>₹119</td></tr>
          <tr><td>Coffee / Tea</td><td>₹39</td></tr>
          <tr><td>House Wine (Glass)</td><td>₹139</td></tr>
          <tr><td>Butter Milk</td><td>₹29</td></tr>
        </table>
      `,

      about: `
        <h2>About Us</h2>
        <p>Indian Cuisine was founded in 2015 by Chef Bhargavi and her friend Yash, with a simple dream: to bring people together over great Indian food.</p>
        <p>We believe in using fresh, locally sourced ingredients and preparing every dish with care. Our menu changes seasonally to reflect the best produce available.</p>

        <h3>Our Team</h3>
        <ul>
          <li><strong>Chef Bhargavi</strong> – Head Chef, 10+ years of culinary experience</li>
          <li><strong>Yash</strong> – Restaurant Manager &amp; Co-founder</li>
          <li><strong>Rani</strong> – Sous Chef</li>
          <li><strong>Govinda</strong> – Pastry Chef</li>
        </ul>

        <h3>Awards &amp; Recognition</h3>
        <ul>
          <li>🏆 Best Restaurant in Town – City Food Awards 2024, 2025</li>
          <li>⭐ Featured in Food &amp; Travel Magazine, 2023</li>
          <li>🌿 Certified Sustainable Dining Partner</li>
        </ul>
      `,

      contact: `
        <h2>Contact &amp; Reservations</h2>

        <h3>Find Us</h3>
        <address>
          Food Street<br>
          Medchal District<br>
          Telangana, 500062<br>
          📞 Phone: (169) 555-888<br>
          📧 Email: hello@indiancuisine.com
        </address>

        <h3>Opening Hours</h3>
        <table border="1" cellpadding="6" cellspacing="0">
          <tr><th>Day</th><th>Hours</th></tr>
          <tr><td>Monday – Thursday</td><td>11:00 AM – 9:30 PM</td></tr>
          <tr><td>Friday – Saturday</td><td>11:00 AM – 11:00 PM</td></tr>
          <tr><td>Sunday</td><td>12:00 PM – 9:00 PM</td></tr>
        </table>

        <h3>Make a Reservation</h3>
        <form onsubmit="submitReservation(event)">
          <label>Name:<br><input type="text" id="res-name" required placeholder="Your full name"></label><br><br>
          <label>Email:<br><input type="email" id="res-email" required placeholder="your@email.com"></label><br><br>
          <label>Date:<br><input type="date" id="res-date" required></label><br><br>
          <label>Time:<br>
            <select id="res-time">
              <option>12:00 PM</option>
              <option>1:00 PM</option>
              <option>6:00 PM</option>
              <option>7:00 PM</option>
              <option>8:00 PM</option>
            </select>
          </label><br><br>
          <label>Guests:<br>
            <select id="res-guests">
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5+</option>
            </select>
          </label><br><br>
          <button type="submit">Submit Reservation</button>
        </form>
        <p id="res-confirm"></p>
      `,
      specials: `
            <h2>Our Specials</h2>
              <p>Chef's handpicked signature dishes you don't want to miss!</p>
              <div class="special-item">
              <img src="images/biryani.jpg" alt="Hyderabadi Chicken Dum Biryani">
              <h3>🔥 Hyderabadi Chicken Dum Biryani</h3>
              <p>Slow-cooked marinated chicken layered with fragrant basmati, and fried onions.</p>
              <span class="price">₹499</span>
              </div>
              <div class="special-item">
              <img src="images/mushroom.jpg" alt="Mushroom Risotto">
              <h3>🍄‍🟫 Mushroom Risotto</h3>
              <p>Creamy arborio rice with wild mushrooms</p>
              <span class="price">₹399</span>
              </div>
              <div class="special-item">
              <img src="images/gulabjamun.jpg" alt="Gulab Jamun">
            <h3>🍩 Gulab Jamun (Special)</h3>
            <p>Golden fried milk dumplings soaked in rose-cardamom syrup, served with ice cream.</p>
            <span class="price">₹99</span>
            </div>
    `
    };

    function showPage(name) {
      document.getElementById('app').innerHTML = pages[name] || '<p>Page not found.</p>';
    }

    function submitReservation(e) {
      e.preventDefault();
      const name = document.getElementById('res-name').value;
      const date = document.getElementById('res-date').value;
      const time = document.getElementById('res-time').value;
      const guests = document.getElementById('res-guests').value;
      document.getElementById('res-confirm').innerHTML =
        `✅ Thank you, <strong>${name}</strong>! Your table for <strong>${guests}</strong> on <strong>${date}</strong> at <strong>${time}</strong> has been requested. We'll confirm via email.`;
    }

    // Load home page on start
    showPage('home');
  </script>

</body>
</html>
